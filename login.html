<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🌊 Flood Prediction System</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="form-container">
    <h2>User Login</h2>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>
    <div th:if="${message}" class="success-msg" th:text="${message}"></div>

    <form action="/login" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn-primary">Login</button>
    </form>

    <p style="margin-top:16px;">Don't have an account? <a href="/register">Register here</a></p>
    <p><a href="/admin/login">Admin Login</a></p>
</div>

</body>
</html>
