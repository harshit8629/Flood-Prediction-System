<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🌊 Admin Panel</div>
    <div class="nav-links">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2>Admin Dashboard</h2>

    <div class="features">
        <div class="feature-card">
            <h3>👥 Total Users</h3>
            <p th:text="${users.size() + ' registered users'}"></p>
        </div>
        <div class="feature-card">
            <h3>📊 Total Predictions</h3>
            <p th:text="${predictions.size() + ' predictions made'}"></p>
        </div>
    </div>

    <h3 style="margin:30px 0 16px;">All Users</h3>
    <table class="data-table">
        <tr>
            <th>ID</th><th>Name</th><th>Email</th>
            <th>Phone</th><th>Location</th><th>Action</th>
        </tr>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.name}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.phone}"></td>
            <td th:text="${u.location}"></td>
            <td><a th:href="@{/admin/delete-user/{id}(id=${u.id})}"
                   class="btn-danger"
                   onclick="return confirm('Delete this user?')">Delete</a></td>
        </tr>
    </table>

    <h3 style="margin:30px 0 16px;">All Predictions</h3>
    <table class="data-table">
        <tr>
            <th>ID</th><th>User</th><th>Location</th>
            <th>Risk Level</th><th>Date</th>
        </tr>
        <tr th:each="p : ${predictions}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.user.name}"></td>
            <td th:text="${p.floodData.location}"></td>
            <td th:class="${'badge-' + p.riskLevel.toLowerCase()}"
                th:text="${p.riskLevel}"></td>
            <td th:text="${p.predictedAt}"></td>
        </tr>
    </table>
</div>

</body>
</html>
