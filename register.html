<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🌊 Flood Prediction System</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="form-container">
    <h2>Create Account</h2>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form action="/register" method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required/>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter your phone number"/>
        </div>
        <div class="form-group">
            <label>Location / City</label>
            <input type="text" name="location" placeholder="Enter your city or area"/>
        </div>
        <button type="submit" class="btn-primary">Register</button>
    </form>

    <p style="margin-top:16px;">Already have an account? <a href="/login">Login here</a></p>
</div>

</body>
</html>
