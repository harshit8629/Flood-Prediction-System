<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enter Flood Data</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🌊 Flood Prediction System</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/history">My History</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="form-container">
    <h2>Enter Flood Data</h2>
    <p style="color:#666; margin-bottom:20px;">Fill in the current environmental conditions</p>

    <form action="/predict" method="post">
        <div class="form-group">
            <label>Rainfall Amount (mm)</label>
            <input type="number" name="rainfall" step="0.1"
                   placeholder="e.g. 150.5" min="0" max="1000" required/>
        </div>
        <div class="form-group">
            <label>River Water Level (metres)</label>
            <input type="number" name="waterLevel" step="0.1"
                   placeholder="e.g. 5.2" min="0" max="20" required/>
        </div>
        <div class="form-group">
            <label>Humidity (%)</label>
            <input type="number" name="humidity" step="0.1"
                   placeholder="e.g. 80" min="0" max="100" required/>
        </div>
        <div class="form-group">
            <label>Temperature (°C)</label>
            <input type="number" name="temperature" step="0.1"
                   placeholder="e.g. 28" min="-10" max="60" required/>
        </div>
        <div class="form-group">
            <label>Area / Location</label>
            <input type="text" name="location"
                   placeholder="e.g. Patna, Bihar" required/>
        </div>
        <div class="form-group">
            <label>Past Flood History in this area?</label>
            <select name="pastFloodHistory">
                <option value="false">No</option>
                <option value="true">Yes</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">🔍 Predict Flood Risk</button>
    </form>
</div>

</body>
</html>
